<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackBurguer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=fastfood" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="telaInicial">

        <video autoplay muted class="background">
            <source src="imagens/Design sem nome.mp4" type="video/mp4">
        </video>

        <div class="conteudoInicial">

            <div class="botoes">
                <button onclick="novoPedido()">
                    Novo Pedido
                </button>

                <button onclick="continuarPedido()">
                    Continuar Pedido
                </button>
            </div>

        </div>

    </div>

    <div class="app escondido">
        <header id="header_logo">
            
            <div id="logo">
                <img src="imagens/ChatGPT Image 20 de abr. de 2026, 00_55_05.png" alt="logo">
            </div>
            <div id="nome_comidas" class="titulo-estilo">
                Entradas
            </div>

        </header>
        
        <div class="container">
            <nav class="menu-lateral">
                <ul>
                    <li data-categoria="entradas"><div><img src="imagens/entrada BB.png" alt="Entradas"></div><h2>Entradas</h2></li>
                    <li data-categoria="burgers tradicionais"><div><img src="imagens/tradicional BB.png" alt="Burgers Tradicionais"></div><h2>Burgers Tradicionais</h2></li>
                    <li data-categoria="burgers especiais"><div><img src="imagens/especial BB.png" alt="Burgers especiais"></div><h2>Burgers especiais</h2></li>
                    <li data-categoria="vegetariano"><div><img src="imagens/vegano BB.png" alt="vegetariano"></div><h2>vegetariano</h2></li>
                    <li data-categoria="bebidas"><div><img src="imagens/bebidas.png" alt="bebidas" style="width: 80%; height: 80%;"></div><h2>bebidas</h2></li>
                    <li data-categoria="nossas pizzas"><div><img src="imagens/pizzas BB.png" alt="nossas pizzas"></div><h2>nossas pizzas</h2></li>
                    <li data-categoria="pizzas doces"><div><img src="imagens/pizzas doces.png" alt="pizzas doces"  style="width: 90%; height: 90%;"></div><h2>pizzas doces</h2></li>
                    <li data-categoria="sobremesas"><div><img src="imagens/sobremesa BB.png" alt="sobremesas"></div><h2>sobremesas</h2></li>
                </ul>
            </nav>

            <section class="produtos">

            </section>

            <div class="carrinho">
                <div class="seu-pedido">
                    <p class="icon">
                        <span class="material-symbols-outlined">
                        fastfood
                        </span>Seu pedido
                    </p> 
                    <p class="preço-resumo">Total R$0.00</p>
                </div>
                <div class="conteudo-resumo-carrinho">
                    <div class="card-carrinho">
                        
                    </div>
                </div>
                <div class="botões-conteudo-carrinho">
                    <button onclick="cancelarPedido()" class="cancelarPedido">Cancelar Pedido</button>
                    <button onclick="verPedido()" class="botaoVer">ver seu pedido</button>
                </div>
            </div>
        </div>

        <div class="verPedido escondido">
            <header id="header_logo">
                <div id="logo">
                    <img src="imagens/ChatGPT Image 20 de abr. de 2026, 00_55_05.png" alt="logo">
                </div>
                <div id="nome_comidas" class="titulo-estilo">
                    Seu pedido
                </div>
            </header>

            <section class="conteinerCarrinho">

            </section>
            
            <footer class="resumo">
                <div class="total">
                    <span>Total</span>
                    <strong class="precoTotal">R$ 00,00</strong>
                </div>

                <button class="pedidoCompleto" onclick="finalizarPedido()">
                    Pedido completo
                </button>

                <div class="acoes">
                    <button class="cancelarPedido" onclick="cancelarPedido()">Cancelar pedido</button>
                    <button class="continuarComprando" onclick="aparecerCarrinho()">Continuar comprando</button>           
                </div>
            </footer>
        </div>

        <div class="pedidoEnviado escondido">
            <div class="mensagem">
                <h2>Pedido enviado!</h2>
                <p>Seu pedido foi enviado para a cozinha</p>
                <button onclick="fecharMensagem()">OK</button>
            </div>
        </div>
    </div>
</body>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</html>
